name: Manual Game Crawler
on:
  workflow_dispatch:
    inputs:
      game_url:
        description: 'The URL of the game directory'
        required: true
        default: 'https://coolmathgames.com'
      folder_name:
        description: 'Name of the folder to save files in'
        required: true
        default: 'my_game'

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run Crawler
        run: python crawler.py "${{ github.event.inputs.game_url }}" "${{ github.event.inputs.folder_name }}"
        
      - name: Upload Game Files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.folder_name }}-files
          path: ./${{ github.event.inputs.folder_name }}/
